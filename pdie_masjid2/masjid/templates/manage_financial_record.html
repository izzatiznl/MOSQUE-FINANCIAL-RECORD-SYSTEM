{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Financial Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #B9E3DA, #D7EDE3);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: #92A8D1 !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar .navbar-brand,
        .navbar .nav-link {
            color: #fff !important;
            font-weight: 500;
        }

        .container-box {
            max-width: 700px;
            margin: 120px auto 40px auto;
            background: rgba(255, 255, 255, 0.96);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        h3 {
            color: #7D9FCF;
            font-weight: 600;
        }

        .btn-lg {
            font-size: 1.2rem;
            padding: 15px;
            font-weight: 500;
        }

        .btn-success {
            background-color: #7DC4B2;
            border: none;
        }

        .btn-success:hover {
            background-color: #5FB09F;
        }

        .btn-danger {
            background-color: #E27D60;
            border: none;
        }

        .btn-danger:hover {
            background-color: #D1644C;
        }

        .btn-primary {
            background-color: #92A8D1;
            border: none;
        }

        .btn-primary:hover {
            background-color: #7D9FCF;
        }

        footer {
            background-color: #7D9FCF;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🕌 Treasurer Panel</a>
        <div>
            <a href="{% url 'treasurer_home' %}" class="btn btn-outline-light me-2">Home</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container-box">
    <h3 class="text-center mb-4">💼 Manage Financial Record</h3>

    <div class="d-grid gap-3">
        <a href="{% url 'manage_income' %}" class="btn btn-success btn-lg">➕ Manage Income Records</a>
        <a href="{% url 'manage_expenses' %}" class="btn btn-danger btn-lg">➖ Manage Expense Records</a>
        <a href="{% url 'view_financial_records' %}" class="btn btn-primary btn-lg">📋 View All Financial Records</a>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container">
        <p class="mb-0">© 2025 Kampung Rinching Hulu Mosque. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
